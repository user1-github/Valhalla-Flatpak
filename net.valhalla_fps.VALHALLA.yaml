id: net.valhalla_fps.VALHALLA
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: valhalla
finish-args:
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --device=dri
  - --persist=.VALHALLA
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
modules:

  - name: SDL2_image
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DSDL2IMAGE_DEPS_SHARED=OFF
      - -DSDL2IMAGE_STRICT=ON
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.12/SDL2_image-2.8.12.tar.gz
        sha256: 393f5efb50536ec13ca4f4affb69cc9966d3c3f969e6c5e701faddf9f9785381

  - name: VALHALLA
    no-autogen: true
    subdir: source
    post-install:
      - install -Dm755 ../valhalla_unix -t /app/bin
      - install -Dm755 ../bin/bin_unix/native_client -t /app/share/valhalla/bin/bin_unix
      - cp -a ../data ../config /app/share/valhalla
      - install -Dm644 ../data/interface/valknut.png /app/share/icons/hicolor/256x256/apps/net.valhalla_fps.VALHALLA.png
      - install -Dm644 ../net.valhalla_fps.VALHALLA.desktop -t /app/share/applications
      - install -Dm644 ../net.valhalla_fps.VALHALLA.metainfo.xml -t /app/share/metainfo
    sources:
      - type: git
        url: https://github.com/project-valhalla/base.git
        tag: 'v1.0.0-beta.2'
        commit: d8001f035947b5853c012358b30ac964c4ce6ba5
      - type: shell
        commands:
          - sed -i 's#VALHALLA_DATA=.#VALHALLA_DATA=/app/share/valhalla/#g' valhalla_unix
      - type: file
        path: net.valhalla_fps.VALHALLA.desktop
      - type: file
        path: net.valhalla_fps.VALHALLA.metainfo.xml
      - type: patch
        path: valhalla-makefile.patch
